<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a73e8;
  --primary-dark: #1557b0;
  --primary-light: #e8f0fe;
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #e0e0e0;
  --text: #212121;
  --text2: #616161;
  --text3: #9e9e9e;
  --success: #2e7d32;
  --success-bg: #e8f5e9;
  --danger: #c62828;
  --danger-bg: #ffebee;
  --warn: #e65100;
  --warn-bg: #fff3e0;
  --purple: #6a1b9a;
  --purple-bg: #f3e5f5;
  --teal: #00695c;
  --teal-bg: #e0f2f1;
  --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
input, select, button { font-family: 'Roboto', sans-serif; font-size: 14px; }

/* ── LOGIN ── */
#login-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
}
.login-box {
  background: var(--surface); border-radius: 8px; padding: 40px 36px;
  width: 360px; box-shadow: 0 2px 10px rgba(0,0,0,.1);
}
.login-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
.lf { margin-bottom: 16px; }
.lf label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
.lf input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  outline: none; transition: border-color .2s;
}
.lf input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,.15); }
.login-btn {
  width: 100%; padding: 11px; background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 4px;
}
.login-btn:hover { background: var(--primary-dark); }
.login-err { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 16px; }

/* ── SHELL ── */
#app { display: none; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  height: 56px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.topbar-title { font-size: 16px; font-weight: 500; }
.topbar-nav { display: flex; gap: 4px; }
.nav-btn {
  padding: 7px 18px; border-radius: 20px; border: none; background: transparent;
  color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s;
}
.nav-btn:hover { background: var(--bg); }
.nav-btn.active { background: var(--primary-light); color: var(--primary); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.user-chip { font-size: 13px; color: var(--text2); }
.logout-btn {
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
  background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s;
}
.logout-btn:hover { border-color: var(--danger); color: var(--danger); }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; }

/* ── FORM PAGE ── */
.form-page { max-width: 820px; margin: 0 auto; padding: 28px 20px; }
.form-page-title { font-size: 18px; font-weight: 500; margin-bottom: 20px; color: var(--text); }

.form-wrap {
  background: var(--surface); border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.1); overflow: hidden;
}
.form-topbar {
  background: var(--primary); padding: 16px 28px;
  display: flex; align-items: center; justify-content: space-between;
}
.form-topbar-title { color: #fff; font-size: 15px; font-weight: 500; }
.form-topbar-sub { color: rgba(255,255,255,.75); font-size: 12px; margin-top: 2px; }
.form-nstyles {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.15); border-radius: var(--radius); padding: 6px 10px;
}
.form-nstyles label { color: rgba(255,255,255,.85); font-size: 12px; white-space: nowrap; }
.form-nstyles input {
  width: 56px; padding: 5px 8px; border: 1px solid rgba(255,255,255,.4);
  border-radius: 4px; background: rgba(255,255,255,.2); color: #fff;
  font-size: 13px; outline: none; text-align: center;
}
.form-nstyles input::placeholder { color: rgba(255,255,255,.5); }
.gen-btn {
  padding: 6px 14px; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4);
  border-radius: 4px; color: #fff; font-size: 12px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: background .15s;
}
.gen-btn:hover { background: rgba(255,255,255,.3); }

/* rows */
.form-section-header {
  padding: 10px 28px; background: #f9f9f9; border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 500;
  letter-spacing: .06em; color: var(--text2); text-transform: uppercase;
}
.form-row {
  display: flex; align-items: center; border-bottom: 1px solid var(--border);
  padding: 0 28px; min-height: 52px;
}
.form-row:last-child { border-bottom: none; }
.form-row:hover { background: #fafafa; }
.row-label {
  width: 200px; min-width: 200px; font-size: 13px; color: var(--text2);
  font-weight: 500; padding-right: 16px;
}
.row-label .req { color: var(--danger); margin-left: 2px; }
.row-input { flex: 1; padding: 8px 0; }
.row-input input, .row-input select {
  width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  outline: none; background: #fff; color: var(--text); transition: border-color .2s;
}
.row-input input:focus, .row-input select:focus {
  border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,.12);
}
.row-input input::placeholder { color: var(--text3); }

/* style blocks */
.style-block-wrap { border-top: 2px solid var(--primary-light); }
.style-block-header {
  padding: 10px 28px; background: var(--primary-light);
  display: flex; align-items: center; gap: 10px;
}
.style-num {
  width: 22px; height: 22px; background: var(--primary); color: #fff;
  border-radius: 50%; font-size: 11px; font-weight: 600;
  display: inline-flex; align-items: center; justify-content: center;
}
.style-block-header span { font-size: 12px; font-weight: 500; color: var(--primary); }

/* form footer */
.form-footer {
  padding: 16px 28px; display: flex; justify-content: flex-end;
  gap: 10px; border-top: 1px solid var(--border); background: #fafafa;
}
.btn-clear {
  padding: 9px 22px; border: 1px solid var(--border); border-radius: var(--radius);
  background: #fff; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer;
}
.btn-clear:hover { background: var(--bg); }
.btn-submit {
  padding: 9px 26px; background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; gap: 8px; transition: background .15s;
}
.btn-submit:hover { background: var(--primary-dark); }
.btn-submit:disabled { opacity: .6; cursor: not-allowed; }

/* ── DASHBOARD ── */
.dash-page { padding: 24px 20px; max-width: 1200px; margin: 0 auto; }
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.dash-title { font-size: 18px; font-weight: 500; }

.stats-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 18px; }
.stat {
  background: var(--surface); border-radius: 8px; padding: 16px 18px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08); border-left: 4px solid transparent;
}
.stat.s-total { border-color: var(--primary); }
.stat.s-approved { border-color: var(--success); }
.stat.s-prod { border-color: #7b1fa2; }
.stat.s-correction { border-color: var(--danger); }
.stat.s-delivered { border-color: var(--teal); }
.stat-lbl { font-size: 11px; color: var(--text2); font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
.stat-num { font-size: 26px; font-weight: 500; }
.stat.s-total .stat-num { color: var(--primary); }
.stat.s-approved .stat-num { color: var(--success); }
.stat.s-prod .stat-num { color: #7b1fa2; }
.stat.s-correction .stat-num { color: var(--danger); }
.stat.s-delivered .stat-num { color: var(--teal); }

.toolbar {
  background: var(--surface); border-radius: 8px; padding: 12px 16px;
  display: flex; gap: 10px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
  flex-wrap: wrap; align-items: center;
}
.toolbar input {
  flex: 1; min-width: 180px; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); outline: none; font-size: 13px;
}
.toolbar input:focus { border-color: var(--primary); }
.toolbar select {
  padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  outline: none; font-size: 13px; background: #fff; cursor: pointer;
}
.toolbar select:focus { border-color: var(--primary); }
.btn-export {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius);
  background: #fff; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer;
  margin-left: auto; white-space: nowrap; transition: all .15s;
}
.btn-export:hover { border-color: var(--primary); color: var(--primary); }
.btn-refresh {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  background: #fff; color: var(--text2); font-size: 13px; cursor: pointer;
}
.btn-refresh:hover { border-color: var(--primary); color: var(--primary); }

.table-wrap { background: var(--surface); border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: #f5f5f5; }
th {
  padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600;
  color: var(--text2); border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: .05em; white-space: nowrap;
}
td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }

.badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 11px; font-weight: 500; }
.b-pending { background: var(--warn-bg); color: var(--warn); }
.b-sampling { background: var(--primary-light); color: var(--primary); }
.b-approved { background: var(--success-bg); color: var(--success); }
.b-production { background: var(--purple-bg); color: var(--purple); }
.b-dispatch { background: var(--teal-bg); color: var(--teal); }
.b-correction { background: var(--danger-bg); color: var(--danger); }
.b-delivered { background: #f0f0f0; color: var(--text2); }

.btn-edit {
  padding: 4px 12px; border: 1px solid var(--border); border-radius: 12px;
  background: #fff; color: var(--primary); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .15s;
}
.btn-edit:hover { border-color: var(--primary); background: var(--primary-light); }
.btn-del {
  padding: 4px 8px; border: 1px solid transparent; border-radius: 12px;
  background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; transition: all .15s;
}
.btn-del:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

/* edit panel */
.edit-panel-wrap td { padding: 0; background: #f9f9f9; }
.edit-panel {
  padding: 0; border-top: 2px solid var(--primary-light);
}
.edit-panel-inner { padding: 20px 28px; }
.ep-section-title {
  font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: 12px; margin-top: 16px;
}
.ep-section-title:first-child { margin-top: 0; }
.ep-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
.ep-field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
.ep-field label { font-size: 11px; font-weight: 500; color: var(--text2); }
.ep-field input, .ep-field select {
  padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  outline: none; background: #fff; font-size: 13px; transition: border-color .2s;
}
.ep-field input:focus, .ep-field select:focus { border-color: var(--primary); }
.locked-block {
  opacity: .4; pointer-events: none; padding: 14px; background: #f0f0f0;
  border-radius: var(--radius); border: 1px dashed var(--border);
}
.locked-block.open { opacity: 1; pointer-events: auto; background: transparent; border: none; padding: 0; }
.lock-msg { font-size: 12px; color: var(--text3); margin-bottom: 10px; font-style: italic; display: flex; align-items: center; gap: 5px; }
.ep-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
.btn-ep-save {
  padding: 8px 20px; background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer;
}
.btn-ep-save:hover { background: var(--primary-dark); }
.btn-ep-cancel {
  padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius);
  background: #fff; color: var(--text2); font-size: 13px; cursor: pointer;
}

.empty { text-align: center; padding: 50px; color: var(--text3); }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast {
  position: fixed; bottom: 24px; right: 24px; padding: 12px 18px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500; opacity: 0; transition: opacity .3s; z-index: 9999; pointer-events: none;
}
.toast.success { background: var(--success); color: #fff; }
.toast.error { background: var(--danger); color: #fff; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-box">
    <div class="login-title">Order Manager</div>
    <div class="login-sub">Sign in to continue</div>
    <div class="lf"><label>Username</label><input id="l-user" placeholder="Username" autocomplete="username"></div>
    <div class="lf"><label>Password</label><input type="password" id="l-pass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">Order Manager</div>
    <div class="topbar-nav">
      <button class="nav-btn active" onclick="showPage('form',this)">＋ New Order</button>
      <button class="nav-btn" onclick="showPage('dashboard',this)">Dashboard</button>
    </div>
    <div class="topbar-right">
      <span class="user-chip" id="user-chip"></span>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <!-- FORM -->
  <div class="page active" id="page-form">
    <div class="form-page">
      <div class="form-wrap">

        <!-- top bar with title + no of styles -->
        <div class="form-topbar">
          <div>
            <div class="form-topbar-title">New Order Entry</div>
            <div class="form-topbar-sub">Fill in all details below</div>
          </div>
          <div class="form-nstyles">
            <label>No. of Styles:</label>
            <input type="number" id="f-nstyles" placeholder="0" min="1" max="50">
            <button class="gen-btn" onclick="generateStyleBlocks()">Generate</button>
          </div>
        </div>

        <!-- CLIENT -->
        <div class="form-section-header">Client Information</div>
        <div class="form-row">
          <div class="row-label">Company <span class="req">*</span></div>
          <div class="row-input"><input id="f-company" placeholder="Company name"></div>
        </div>
        <div class="form-row">
          <div class="row-label">Brand Name</div>
          <div class="row-input"><input id="f-brand" placeholder="Brand name"></div>
        </div>
        <div class="form-row">
          <div class="row-label">Buyer Name</div>
          <div class="row-input"><input id="f-buyer" placeholder="Buyer name"></div>
        </div>

        <!-- ORDER -->
        <div class="form-section-header">Order Information</div>
        <div class="form-row">
          <div class="row-label">Mail Subject</div>
          <div class="row-input"><input id="f-mail" placeholder="Email thread subject"></div>
        </div>
        <div class="form-row">
          <div class="row-label">Purchase Order</div>
          <div class="row-input"><input id="f-po" placeholder="PO number"></div>
        </div>
        <div class="form-row">
          <div class="row-label">Purchase Invoice</div>
          <div class="row-input"><input id="f-invoice" placeholder="Invoice number"></div>
        </div>

        <!-- STYLE BLOCKS -->
        <div id="styles-container"></div>

        <div class="form-footer">
          <button class="btn-clear" onclick="clearForm()">Clear</button>
          <button class="btn-submit" id="save-btn" onclick="saveOrder()">
            <span id="save-label">Submit Order</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="page" id="page-dashboard">
    <div class="dash-page">
      <div class="dash-header">
        <div class="dash-title">Dashboard</div>
        <button class="btn-refresh" onclick="loadDashboard()">↻ Refresh</button>
      </div>

      <div class="stats-row" id="stats-row"></div>

      <div class="toolbar">
        <input id="search" placeholder="Search company, brand, style, buyer…" oninput="renderTable()">
        <select id="f-status" onchange="renderTable()">
          <option value="">All statuses</option>
          <option>Pending</option><option>Tech Pack Received</option><option>Sampling</option>
          <option>Correction Required</option><option>Approved</option><option>In Production</option>
          <option>Packing</option><option>Ready for Dispatch</option><option>Delivered</option>
        </select>
        <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Company</th><th>Brand</th><th>Buyer</th><th>Style No.</th>
              <th>Qty</th><th>Tech Pack</th><th>Samples</th>
              <th>Status</th><th>Delivery</th><th>Approved</th><th></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div id="empty-state" class="empty" style="display:none">No orders found</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://dpvirfanawqarzpmgmmd.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwdmlyZmFuYXdxYXJ6cG1nbW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjQzMDMsImV4cCI6MjA5NjEwMDMwM30.oyhoH21o6zJ1WYisvx8uvTbb-DP_k71Sh8tCJ0MB2Kk';
const H = { 'Content-Type':'application/json', 'apikey': SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY };
let currentUser=null, allOrders=[], allStyles=[], expandedId=null;

async function sb(path, opts={}) {
  const r = await fetch(SUPA_URL+'/rest/v1/'+path, { headers:H, ...opts });
  if (!r.ok) throw new Error(await r.text());
  if (r.status===204) return null;
  return r.json();
}

async function doLogin() {
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value.trim();
  const err=document.getElementById('login-err');
  err.textContent='';
  if (!u||!p){err.textContent='Enter username and password.';return;}
  try {
    const rows=await sb(`users?username=eq.${encodeURIComponent(u)}&password=eq.${encodeURIComponent(p)}&select=id,username,role`);
    if (!rows||!rows.length){err.textContent='Incorrect username or password.';return;}
    currentUser=rows[0];
    document.getElementById('login-page').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('user-chip').textContent=currentUser.username;
  } catch(e){err.textContent='Connection error.';}
}
function doLogout(){
  currentUser=null;
  document.getElementById('login-page').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('l-pass').value='';
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='dashboard')loadDashboard();
}

function generateStyleBlocks(){
  const n=parseInt(document.getElementById('f-nstyles').value)||0;
  if(n<1){showToast('Enter number of styles','error');return;}
  const c=document.getElementById('styles-container');
  c.innerHTML='';
  for(let i=1;i<=n;i++){
    c.innerHTML+=`
    <div class="style-block-wrap">
      <div class="style-block-header">
        <span class="style-num">${i}</span>
        <span>Style ${i}</span>
      </div>
      <div class="form-row">
        <div class="row-label">Style No.</div>
        <div class="row-input"><input id="s${i}-style_no" placeholder="e.g. ST-00${i}"></div>
      </div>
      <div class="form-row">
        <div class="row-label">Quantity</div>
        <div class="row-input"><input type="number" id="s${i}-quantity" placeholder="0"></div>
      </div>
      <div class="form-row">
        <div class="row-label">Tech Pack Received</div>
        <div class="row-input"><input type="date" id="s${i}-tech_pack_date"></div>
      </div>
      <div class="form-row">
        <div class="row-label">HD File</div>
        <div class="row-input">
          <select id="s${i}-hd_file">
            <option value="">— Select —</option>
            <option>Received</option><option>Pending</option><option>Not required</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="row-label">Digital</div>
        <div class="row-input">
          <select id="s${i}-digital">
            <option value="">— Select —</option>
            <option>Received</option><option>Pending</option><option>Not required</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="row-label">Samples Submitted</div>
        <div class="row-input"><input type="date" id="s${i}-samples_submitted_date"></div>
      </div>
    </div>`;
  }
}

async function saveOrder(){
  const company=document.getElementById('f-company').value.trim();
  const nstyles=parseInt(document.getElementById('f-nstyles').value)||0;
  if(!company){showToast('Company name is required','error');return;}
  if(!nstyles||!document.getElementById('styles-container').children.length){
    showToast('Generate style fields first','error');return;
  }
  const btn=document.getElementById('save-btn');
  const lbl=document.getElementById('save-label');
  btn.disabled=true;lbl.innerHTML='<span class="spinner"></span>';
  try {
    const res=await sb('orders?select=id',{
      method:'POST', headers:{...H,'Prefer':'return=representation'},
      body:JSON.stringify({
        company,
        brand_name:document.getElementById('f-brand').value.trim()||null,
        buyer_name:document.getElementById('f-buyer').value.trim()||null,
        mail_subject:document.getElementById('f-mail').value.trim()||null,
        purchase_order:document.getElementById('f-po').value.trim()||null,
        purchase_invoice:document.getElementById('f-invoice').value.trim()||null,
        number_of_styles:nstyles
      })
    });
    const orderId=res[0].id;
    const payload=[];
    for(let i=1;i<=nstyles;i++){
      payload.push({
        order_id:orderId,
        style_no:document.getElementById(`s${i}-style_no`).value.trim()||null,
        quantity:parseInt(document.getElementById(`s${i}-quantity`).value)||null,
        tech_pack_date:document.getElementById(`s${i}-tech_pack_date`).value||null,
        hd_file:document.getElementById(`s${i}-hd_file`).value||null,
        digital:document.getElementById(`s${i}-digital`).value||null,
        samples_submitted_date:document.getElementById(`s${i}-samples_submitted_date`).value||null,
      });
    }
    await sb('styles',{method:'POST',body:JSON.stringify(payload)});
    showToast('Order saved successfully!','success');
    clearForm();
  } catch(e){showToast('Error saving. Try again.','error');console.error(e);}
  btn.disabled=false;lbl.textContent='Submit Order';
}

function clearForm(){
  ['f-company','f-brand','f-buyer','f-mail','f-po','f-invoice','f-nstyles']
    .forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('styles-container').innerHTML='';
}

async function loadDashboard(){
  document.getElementById('table-body').innerHTML=
    '<tr><td colspan="11" style="text-align:center;padding:40px;color:#9e9e9e">Loading…</td></tr>';
  try {
    const [orders,styles]=await Promise.all([
      sb('orders?select=*&order=created_at.desc'),
      sb('styles?select=*&order=created_at.desc')
    ]);
    allOrders=orders||[];allStyles=styles||[];
    renderStats();renderTable();
  } catch(e){showToast('Error loading data','error');}
}

function renderStats(){
  const t=allStyles.length;
  const ap=allStyles.filter(s=>s.approved_date).length;
  const pr=allStyles.filter(s=>['In Production','Packing'].includes(s.production_status)).length;
  const co=allStyles.filter(s=>s.production_status==='Correction Required').length;
  const de=allStyles.filter(s=>s.production_status==='Delivered').length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat s-total"><div class="stat-lbl">Total Styles</div><div class="stat-num">${t}</div></div>
    <div class="stat s-approved"><div class="stat-lbl">Approved</div><div class="stat-num">${ap}</div></div>
    <div class="stat s-prod"><div class="stat-lbl">In Production</div><div class="stat-num">${pr}</div></div>
    <div class="stat s-correction"><div class="stat-lbl">Correction</div><div class="stat-num">${co}</div></div>
    <div class="stat s-delivered"><div class="stat-lbl">Delivered</div><div class="stat-num">${de}</div></div>`;
}

const SB={'Pending':'b-pending','Tech Pack Received':'b-sampling','Sampling':'b-sampling',
  'Correction Required':'b-correction','Approved':'b-approved','In Production':'b-production',
  'Packing':'b-production','Ready for Dispatch':'b-dispatch','Delivered':'b-delivered'};

function renderTable(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const sf=document.getElementById('f-status')?.value||'';
  const tbody=document.getElementById('table-body');
  tbody.innerHTML='';
  let rows=allStyles.map(s=>{
    const o=allOrders.find(o=>o.id===s.order_id)||{};
    return{...s,company:o.company,brand_name:o.brand_name,buyer_name:o.buyer_name,
      purchase_order:o.purchase_order,purchase_invoice:o.purchase_invoice};
  }).filter(r=>{
    const ms=!q||[r.company,r.brand_name,r.buyer_name,r.style_no,r.purchase_order].join(' ').toLowerCase().includes(q);
    return ms&&(!sf||r.production_status===sf);
  });
  document.getElementById('empty-state').style.display=rows.length?'none':'block';
  rows.forEach(r=>{
    const exp=expandedId===r.id;
    const appr=!!r.approved_date;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><b style="font-weight:500">${r.company||'—'}</b></td>
      <td>${r.brand_name||'—'}</td>
      <td>${r.buyer_name||'—'}</td>
      <td><code style="background:#f5f5f5;padding:2px 6px;border-radius:4px;font-size:12px">${r.style_no||'—'}</code></td>
      <td>${r.quantity||'—'}</td>
      <td style="color:#757575;font-size:12px">${r.tech_pack_date?fd(r.tech_pack_date):'—'}</td>
      <td style="color:#757575;font-size:12px">${r.samples_submitted_date?fd(r.samples_submitted_date):'—'}</td>
      <td><span class="badge ${SB[r.production_status]||'b-pending'}">${r.production_status||'Pending'}</span></td>
      <td style="color:#757575;font-size:12px">${r.delivery_date?fd(r.delivery_date):'—'}</td>
      <td style="color:${appr?'var(--success)':'#bdbdbd'};font-weight:500">${appr?'✓ Yes':'—'}</td>
      <td style="white-space:nowrap">
        <button class="btn-edit" onclick="toggleExpand('${r.id}')">${exp?'Close':'Edit'}</button>
        <button class="btn-del" onclick="delStyle('${r.id}')">✕</button>
      </td>`;
    tbody.appendChild(tr);

    if(exp){
      const ep=document.createElement('tr');
      ep.className='edit-panel-wrap';
      ep.innerHTML=`<td colspan="11"><div class="edit-panel"><div class="edit-panel-inner">
        <div class="ep-section-title">Sampling & Approval</div>
        <div class="ep-row">
          <div class="ep-field"><label>Approved Date</label>
            <input type="date" id="ep-ap-${r.id}" value="${r.approved_date||''}" onchange="onApprChange('${r.id}')">
          </div>
          <div class="ep-field"><label>Corrections Date</label>
            <input type="date" id="ep-cd-${r.id}" value="${r.corrections_date||''}">
          </div>
          <div class="ep-field" style="flex:2"><label>Correction Remarks</label>
            <input type="text" id="ep-cr-${r.id}" placeholder="Remarks…" value="${r.correction_remarks||''}">
          </div>
          <div class="ep-field"><label>Revised</label>
            <select id="ep-rv-${r.id}">
              <option value="false" ${!r.revised?'selected':''}>No</option>
              <option value="true" ${r.revised?'selected':''}>Yes</option>
            </select>
          </div>
        </div>

        <div class="ep-section-title" style="margin-top:16px">Production & Shipping</div>
        <div id="ep-lock-${r.id}" class="${appr?'locked-block open':'locked-block'}">
          ${!appr?'<div class="lock-msg">🔒 Set Approved Date above to unlock</div>':''}
          <div class="ep-row">
            <div class="ep-field"><label>Production Status</label>
              <select id="ep-st-${r.id}">
                <option>Pending</option><option>Tech Pack Received</option><option>Sampling</option>
                <option>Correction Required</option><option>Approved</option><option>In Production</option>
                <option>Packing</option><option>Ready for Dispatch</option><option>Delivered</option>
              </select>
            </div>
            <div class="ep-field"><label>Delivery Date</label>
              <input type="date" id="ep-dl-${r.id}" value="${r.delivery_date||''}">
            </div>
            <div class="ep-field"><label>No. of Boxes</label>
              <input type="number" id="ep-bx-${r.id}" value="${r.number_of_boxes||''}">
            </div>
            <div class="ep-field"><label>Weight (kg)</label>
              <input type="number" step="0.1" id="ep-wt-${r.id}" value="${r.weight||''}">
            </div>
          </div>
        </div>

        <div class="ep-actions">
          <button class="btn-ep-save" onclick="saveUpdate('${r.id}')">Save changes</button>
          <button class="btn-ep-cancel" onclick="toggleExpand('${r.id}')">Cancel</button>
        </div>
      </div></div></td>`;
      tbody.appendChild(ep);
      const sel=document.getElementById(`ep-st-${r.id}`);
      if(sel&&r.production_status)sel.value=r.production_status;
    }
  });
}

function onApprChange(id){
  const v=document.getElementById(`ep-ap-${id}`).value;
  const block=document.getElementById(`ep-lock-${id}`);
  if(!block)return;
  if(v){
    block.classList.add('open');
    const msg=block.querySelector('.lock-msg');
    if(msg)msg.remove();
  } else {
    block.classList.remove('open');
  }
}

function toggleExpand(id){
  expandedId=expandedId===id?null:id;
  renderTable();
}

async function saveUpdate(id){
  const ap=document.getElementById(`ep-ap-${id}`).value;
  const payload={
    approved_date:ap||null,
    corrections_date:document.getElementById(`ep-cd-${id}`).value||null,
    correction_remarks:document.getElementById(`ep-cr-${id}`).value.trim()||null,
    revised:document.getElementById(`ep-rv-${id}`).value==='true',
    ...(ap&&{
      production_status:document.getElementById(`ep-st-${id}`).value,
      delivery_date:document.getElementById(`ep-dl-${id}`).value||null,
      number_of_boxes:parseInt(document.getElementById(`ep-bx-${id}`).value)||null,
      weight:parseFloat(document.getElementById(`ep-wt-${id}`).value)||null,
    })
  };
  try {
    await sb(`styles?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(payload)});
    showToast('Changes saved!','success');
    expandedId=null;
    await loadDashboard();
  } catch(e){showToast('Error saving.','error');}
}

async function delStyle(id){
  if(!confirm('Delete this style?'))return;
  try {
    await sb(`styles?id=eq.${id}`,{method:'DELETE'});
    showToast('Deleted','success');
    expandedId=null;
    await loadDashboard();
  } catch(e){showToast('Error deleting.','error');}
}

function exportCSV(){
  if(!allStyles.length){showToast('No data','error');return;}
  const rows=allStyles.map(s=>{
    const o=allOrders.find(o=>o.id===s.order_id)||{};
    return[o.company,o.brand_name,o.buyer_name,o.mail_subject,o.purchase_order,o.purchase_invoice,
      s.style_no,s.quantity,s.tech_pack_date,s.hd_file,s.digital,s.samples_submitted_date,
      s.approved_date,s.corrections_date,s.correction_remarks,s.revised?'Yes':'No',
      s.production_status,s.delivery_date,s.number_of_boxes,s.weight]
      .map(v=>`"${v||''}"`).join(',');
  });
  const hdr='Company,Brand,Buyer,Mail Subject,PO,Invoice,Style No,Qty,Tech Pack Date,HD File,Digital,Samples Date,Approved Date,Corrections Date,Remarks,Revised,Production Status,Delivery Date,Boxes,Weight';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([hdr+'\n'+rows.join('\n')],{type:'text/csv'}));
  a.download='orders_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function fd(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
