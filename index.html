<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1a73e8;
  --primary-dark: #1557b0;
  --primary-light: #e8f0fe;
  --bg: #f0f4f9;
  --surface: #ffffff;
  --border: #e0e0e0;
  --text: #212121;
  --text2: #616161;
  --text3: #9e9e9e;
  --success: #2e7d32;
  --success-bg: #e8f5e9;
  --danger: #c62828;
  --danger-bg: #ffebee;
  --warn: #e65100;
  --warn-bg: #fff3e0;
  --purple: #6a1b9a;
  --purple-bg: #f3e5f5;
  --teal: #00695c;
  --teal-bg: #e0f2f1;
  --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
input, select, button { font-family: 'Roboto', sans-serif; font-size: 13px; }

/* LOGIN */
#login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); }
.login-box { background:var(--surface); border-radius:8px; padding:40px 36px; width:360px; box-shadow:0 2px 10px rgba(0,0,0,.1); }
.login-title { font-size:20px; font-weight:500; margin-bottom:4px; }
.login-sub { font-size:13px; color:var(--text2); margin-bottom:28px; }
.lf { margin-bottom:16px; }
.lf label { display:block; font-size:12px; font-weight:500; color:var(--text2); margin-bottom:5px; }
.lf input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius); outline:none; transition:border-color .2s; }
.lf input:focus { border-color:var(--primary); box-shadow:0 0 0 2px rgba(26,115,232,.15); }
.login-btn { width:100%; padding:11px; background:var(--primary); color:#fff; border:none; border-radius:var(--radius); font-size:14px; font-weight:500; cursor:pointer; }
.login-btn:hover { background:var(--primary-dark); }
.login-err { color:var(--danger); font-size:12px; margin-top:8px; min-height:16px; }

/* SHELL */
#app { display:none; flex-direction:column; min-height:100vh; }
.topbar { background:var(--surface); border-bottom:1px solid var(--border); height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; position:sticky; top:0; z-index:100; box-shadow:0 1px 3px rgba(0,0,0,.08); }
.topbar-title { font-size:16px; font-weight:500; }
.topbar-nav { display:flex; gap:4px; }
.nav-btn { padding:7px 18px; border-radius:20px; border:none; background:transparent; color:var(--text2); font-size:13px; font-weight:500; cursor:pointer; transition:all .15s; }
.nav-btn:hover { background:var(--bg); }
.nav-btn.active { background:var(--primary-light); color:var(--primary); }
.topbar-right { display:flex; align-items:center; gap:10px; }
.user-chip { font-size:13px; color:var(--text2); }
.logout-btn { padding:6px 14px; border:1px solid var(--border); border-radius:20px; background:transparent; color:var(--text2); font-size:12px; cursor:pointer; }
.logout-btn:hover { border-color:var(--danger); color:var(--danger); }

/* PAGES */
.page { display:none; }
.page.active { display:block; }

/* FORM */
.form-page { max-width:820px; margin:0 auto; padding:28px 20px; }
.form-wrap { background:var(--surface); border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.1); overflow:hidden; }
.form-topbar { background:var(--primary); padding:16px 28px; display:flex; align-items:center; justify-content:space-between; }
.form-topbar-title { color:#fff; font-size:15px; font-weight:500; }
.form-topbar-sub { color:rgba(255,255,255,.75); font-size:12px; margin-top:2px; }
.form-nstyles { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.15); border-radius:var(--radius); padding:6px 10px; }
.form-nstyles label { color:rgba(255,255,255,.85); font-size:12px; white-space:nowrap; }
.form-nstyles input { width:56px; padding:5px 8px; border:1px solid rgba(255,255,255,.4); border-radius:4px; background:rgba(255,255,255,.2); color:#fff; outline:none; text-align:center; }
.gen-btn { padding:6px 14px; background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.4); border-radius:4px; color:#fff; font-size:12px; font-weight:500; cursor:pointer; }
.gen-btn:hover { background:rgba(255,255,255,.3); }
.form-section-header { padding:10px 28px; background:#f9f9f9; border-top:1px solid var(--border); border-bottom:1px solid var(--border); font-size:11px; font-weight:500; letter-spacing:.06em; color:var(--text2); text-transform:uppercase; }
.form-row { display:flex; align-items:center; border-bottom:1px solid var(--border); padding:0 28px; min-height:52px; }
.form-row:hover { background:#fafafa; }
.row-label { width:200px; min-width:200px; font-size:13px; color:var(--text2); font-weight:500; padding-right:16px; }
.row-label .req { color:var(--danger); margin-left:2px; }
.row-input { flex:1; padding:8px 0; }
.row-input input, .row-input select { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:var(--radius); outline:none; background:#fff; color:var(--text); transition:border-color .2s; }
.row-input input:focus, .row-input select:focus { border-color:var(--primary); box-shadow:0 0 0 2px rgba(26,115,232,.12); }
.row-input input::placeholder { color:var(--text3); }
.style-block-wrap { border-top:2px solid var(--primary-light); }
.style-block-header { padding:10px 28px; background:var(--primary-light); display:flex; align-items:center; gap:10px; }
.style-num { width:22px; height:22px; background:var(--primary); color:#fff; border-radius:50%; font-size:11px; font-weight:600; display:inline-flex; align-items:center; justify-content:center; }
.style-block-header span { font-size:12px; font-weight:500; color:var(--primary); }
.form-footer { padding:16px 28px; display:flex; justify-content:flex-end; gap:10px; border-top:1px solid var(--border); background:#fafafa; }
.btn-clear { padding:9px 22px; border:1px solid var(--border); border-radius:var(--radius); background:#fff; color:var(--text2); font-size:13px; font-weight:500; cursor:pointer; }
.btn-submit { padding:9px 26px; background:var(--primary); color:#fff; border:none; border-radius:var(--radius); font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:8px; }
.btn-submit:hover { background:var(--primary-dark); }
.btn-submit:disabled { opacity:.6; cursor:not-allowed; }

/* DASHBOARD */
.dash-page { padding:24px 20px; max-width:1400px; margin:0 auto; }
.dash-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.dash-title { font-size:18px; font-weight:500; }
.dash-actions { display:flex; gap:8px; }
.stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:16px; }
.stat { background:var(--surface); border-radius:8px; padding:14px 16px; box-shadow:0 1px 3px rgba(0,0,0,.08); border-left:4px solid transparent; }
.stat.s-total { border-color:var(--primary); }
.stat.s-approved { border-color:var(--success); }
.stat.s-prod { border-color:#7b1fa2; }
.stat.s-correction { border-color:var(--danger); }
.stat.s-delivered { border-color:var(--teal); }
.stat-lbl { font-size:11px; color:var(--text2); font-weight:500; margin-bottom:4px; text-transform:uppercase; letter-spacing:.04em; }
.stat-num { font-size:24px; font-weight:500; }
.stat.s-total .stat-num { color:var(--primary); }
.stat.s-approved .stat-num { color:var(--success); }
.stat.s-prod .stat-num { color:#7b1fa2; }
.stat.s-correction .stat-num { color:var(--danger); }
.stat.s-delivered .stat-num { color:var(--teal); }

.toolbar { background:var(--surface); border-radius:8px; padding:10px 14px; display:flex; gap:8px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.08); flex-wrap:wrap; align-items:center; }
.toolbar input { flex:1; min-width:160px; padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius); outline:none; }
.toolbar input:focus { border-color:var(--primary); }
.toolbar select { padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius); outline:none; background:#fff; cursor:pointer; }
.btn-sm { padding:7px 14px; border:1px solid var(--border); border-radius:var(--radius); background:#fff; color:var(--text2); font-size:12px; font-weight:500; cursor:pointer; white-space:nowrap; }
.btn-sm:hover { border-color:var(--primary); color:var(--primary); }

/* ORDER CARDS */
.orders-list { display:flex; flex-direction:column; gap:12px; }
.order-card {
  background:var(--surface); border-radius:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.08); overflow:hidden;
}
.order-card-header {
  padding:12px 18px; background:#f8f9fa; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.order-header-field { display:flex; flex-direction:column; gap:2px; }
.order-header-label { font-size:10px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; }
.order-header-value { font-size:13px; font-weight:500; color:var(--text); }
.order-header-value.editable {
  border:1px solid transparent; border-radius:4px; padding:2px 6px;
  outline:none; background:transparent; font-size:13px; font-weight:500;
  transition:all .15s; min-width:80px;
}
.order-header-value.editable:hover { border-color:var(--border); background:#fff; }
.order-header-value.editable:focus { border-color:var(--primary); background:#fff; box-shadow:0 0 0 2px rgba(26,115,232,.1); }
.order-card-divider { flex:1; }

/* STYLE ROWS inside card */
.style-rows-wrap { overflow-x:auto; }
.style-table { width:100%; border-collapse:collapse; font-size:12px; }
.style-table th {
  padding:7px 10px; text-align:left; font-size:10px; font-weight:600;
  color:var(--text2); background:#fafafa; border-bottom:1px solid var(--border);
  text-transform:uppercase; letter-spacing:.04em; white-space:nowrap;
}
.style-table td { padding:5px 6px; border-bottom:1px solid #f5f5f5; vertical-align:middle; }
.style-table tr:last-child td { border-bottom:none; }
.style-table tr:hover td { background:#fafafa; }

/* ROW 1 — info fields */
.row1 td { background:#fff; }
.row2 td { background:#fdfcff; border-bottom:2px solid #f0f0f0; }
.style-table tr.row2:last-of-type td { border-bottom:none; }

/* CELL INPUTS */
.ci {
  width:100%; padding:4px 7px; border:1px solid transparent; border-radius:4px;
  background:transparent; color:var(--text); font-size:12px; outline:none;
  transition:all .15s;
}
.ci:hover { border-color:var(--border); background:#fff; }
.ci:focus { border-color:var(--primary); background:#fff; box-shadow:0 0 0 2px rgba(26,115,232,.1); }
.ci::placeholder { color:var(--text3); }
.ci.locked { opacity:.3; pointer-events:none; }
input[type="date"].ci { min-width:120px; }

/* TOGGLE */
.toggle-wrap { display:flex; align-items:center; gap:5px; }
.toggle { position:relative; width:36px; height:20px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; border-radius:20px; transition:.2s; }
.toggle-slider:before { position:absolute; content:''; height:14px; width:14px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.2s; }
.toggle input:checked + .toggle-slider { background:var(--success); }
.toggle input:checked + .toggle-slider:before { transform:translateX(16px); }
.tlbl { font-size:11px; font-weight:500; color:var(--text3); white-space:nowrap; }
.tlbl.yes { color:var(--success); }

.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:500; white-space:nowrap; }
.b-pending { background:var(--warn-bg); color:var(--warn); }
.b-sampling { background:var(--primary-light); color:var(--primary); }
.b-approved { background:var(--success-bg); color:var(--success); }
.b-production { background:var(--purple-bg); color:var(--purple); }
.b-dispatch { background:var(--teal-bg); color:var(--teal); }
.b-correction { background:var(--danger-bg); color:var(--danger); }
.b-delivered { background:#f0f0f0; color:var(--text2); }

.btn-save-row { padding:4px 12px; background:var(--primary); color:#fff; border:none; border-radius:4px; font-size:11px; font-weight:500; cursor:pointer; white-space:nowrap; }
.btn-save-row:hover { background:var(--primary-dark); }
.btn-save-row:disabled { opacity:.6; }
.btn-del-row { padding:4px 8px; border:1px solid transparent; border-radius:4px; background:transparent; color:var(--text3); font-size:12px; cursor:pointer; }
.btn-del-row:hover { border-color:var(--danger); color:var(--danger); background:var(--danger-bg); }

.style-no-badge { display:inline-flex; align-items:center; justify-content:center; min-width:24px; height:20px; background:var(--primary); color:#fff; border-radius:10px; font-size:10px; font-weight:600; padding:0 6px; }

.empty { text-align:center; padding:50px; color:var(--text3); }
.spinner { width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; display:inline-block; }
.spinner-dark { border-color:rgba(0,0,0,.1); border-top-color:var(--primary); }
@keyframes spin { to { transform:rotate(360deg); } }
.toast { position:fixed; bottom:24px; right:24px; padding:12px 18px; border-radius:var(--radius); font-size:13px; font-weight:500; opacity:0; transition:opacity .3s; z-index:9999; pointer-events:none; }
.toast.success { background:var(--success); color:#fff; }
.toast.error { background:var(--danger); color:#fff; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-box">
    <div class="login-title">Order Manager</div>
    <div class="login-sub">Sign in to continue</div>
    <div class="lf"><label>Username</label><input id="l-user" placeholder="Username" autocomplete="username"></div>
    <div class="lf"><label>Password</label><input type="password" id="l-pass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-title">Order Manager</div>
    <div class="topbar-nav">
      <button class="nav-btn active" onclick="showPage('form',this)">＋ New Order</button>
      <button class="nav-btn" onclick="showPage('dashboard',this)">Dashboard</button>
    </div>
    <div class="topbar-right">
      <span class="user-chip" id="user-chip"></span>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <!-- FORM -->
  <div class="page active" id="page-form">
    <div class="form-page">
      <div class="form-wrap">
        <div class="form-topbar">
          <div>
            <div class="form-topbar-title">New Order Entry</div>
            <div class="form-topbar-sub">Fill in details and generate style fields</div>
          </div>
          <div class="form-nstyles">
            <label>No. of Styles:</label>
            <input type="number" id="f-nstyles" placeholder="0" min="1" max="50">
            <button class="gen-btn" onclick="generateStyleBlocks()">Generate</button>
          </div>
        </div>
        <div class="form-section-header">Client Information</div>
        <div class="form-row"><div class="row-label">Company <span class="req">*</span></div><div class="row-input"><input id="f-company" placeholder="Company name"></div></div>
        <div class="form-row"><div class="row-label">Brand Name</div><div class="row-input"><input id="f-brand" placeholder="Brand name"></div></div>
        <div class="form-row"><div class="row-label">Buyer Name</div><div class="row-input"><input id="f-buyer" placeholder="Buyer name"></div></div>
        <div class="form-section-header">Order Information</div>
        <div class="form-row"><div class="row-label">Mail Subject</div><div class="row-input"><input id="f-mail" placeholder="Email thread subject"></div></div>
        <div class="form-row"><div class="row-label">Purchase Order</div><div class="row-input"><input id="f-po" placeholder="PO number"></div></div>
        <div class="form-row"><div class="row-label">Purchase Invoice</div><div class="row-input"><input id="f-invoice" placeholder="Invoice number"></div></div>
        <div id="styles-container"></div>
        <div class="form-footer">
          <button class="btn-clear" onclick="clearForm()">Clear</button>
          <button class="btn-submit" id="save-btn" onclick="saveOrder()"><span id="save-label">Submit Order</span></button>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="page" id="page-dashboard">
    <div class="dash-page">
      <div class="dash-header">
        <div class="dash-title">Dashboard</div>
        <div class="dash-actions">
          <button class="btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
          <button class="btn-sm" onclick="loadDashboard()">↻ Refresh</button>
        </div>
      </div>
      <div class="stats-row" id="stats-row"></div>
      <div class="toolbar">
        <input id="search" placeholder="Search company, brand, style, buyer…" oninput="renderDash()">
        <select id="f-status" onchange="renderDash()">
          <option value="">Active orders (excl. Delivered)</option>
          <option value="all">All orders incl. Delivered</option>
          <option disabled>──────────</option>
          <option>Pending</option><option>Tech Pack Received</option><option>Sampling</option>
          <option>Correction Required</option><option>Approved</option><option>In Production</option>
          <option>Packing</option><option>Ready for Dispatch</option><option>Delivered</option>
        </select>
        <select id="f-sort" onchange="renderDash()">
          <option value="date-desc">Date — Newest first</option>
          <option value="date-asc">Date — Oldest first</option>
          <option value="company-asc">Company — A to Z</option>
          <option value="company-desc">Company — Z to A</option>
        </select>
      </div>
      <div id="delivered-notice" style="font-size:12px;color:var(--text3);margin-bottom:10px;padding-left:4px;display:none">
        <span id="delivered-count"></span> delivered orders hidden —
        <a href="#" style="color:var(--primary);text-decoration:none" onclick="document.getElementById('f-status').value='all';renderDash();return false">show all</a>
      </div>
      <div class="orders-list" id="orders-list">
        <div class="empty">Loading…</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://dpvirfanawqarzpmgmmd.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwdmlyZmFuYXdxYXJ6cG1nbW1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjQzMDMsImV4cCI6MjA5NjEwMDMwM30.oyhoH21o6zJ1WYisvx8uvTbb-DP_k71Sh8tCJ0MB2Kk';
const H={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};
let currentUser=null,allOrders=[],allStyles=[];

async function sb(path,opts={}){
  const r=await fetch(SUPA_URL+'/rest/v1/'+path,{headers:H,...opts});
  if(!r.ok)throw new Error(await r.text());
  if(r.status===204)return null;
  return r.json();
}

async function doLogin(){
  const u=document.getElementById('l-user').value.trim();
  const p=document.getElementById('l-pass').value.trim();
  const err=document.getElementById('login-err');
  err.textContent='';
  if(!u||!p){err.textContent='Enter username and password.';return;}
  try{
    const rows=await sb(`users?username=eq.${encodeURIComponent(u)}&password=eq.${encodeURIComponent(p)}&select=id,username,role`);
    if(!rows||!rows.length){err.textContent='Incorrect username or password.';return;}
    currentUser=rows[0];
    document.getElementById('login-page').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('user-chip').textContent=currentUser.username;
  }catch(e){err.textContent='Connection error.';}
}
function doLogout(){
  currentUser=null;
  document.getElementById('login-page').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('l-pass').value='';
}
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  if(name==='dashboard')loadDashboard();
}

// ── FORM ──
function generateStyleBlocks(){
  const n=parseInt(document.getElementById('f-nstyles').value)||0;
  if(n<1){showToast('Enter number of styles','error');return;}
  const c=document.getElementById('styles-container');
  c.innerHTML='';
  for(let i=1;i<=n;i++){
    c.innerHTML+=`
    <div class="style-block-wrap">
      <div class="style-block-header"><span class="style-num">${i}</span><span>Style ${i}</span></div>
      <div class="form-row"><div class="row-label">Style No.</div><div class="row-input"><input id="s${i}-style_no" placeholder="e.g. ST-00${i}"></div></div>
      <div class="form-row"><div class="row-label">Quantity</div><div class="row-input"><input type="number" id="s${i}-quantity" placeholder="0"></div></div>
      <div class="form-row"><div class="row-label">Tech Pack Received</div><div class="row-input"><input type="date" id="s${i}-tech_pack_date"></div></div>
      <div class="form-row"><div class="row-label">HD File</div><div class="row-input"><select id="s${i}-hd_file"><option value="">— Select —</option><option>Received</option><option>Pending</option><option>Not required</option></select></div></div>
      <div class="form-row"><div class="row-label">Digital</div><div class="row-input"><select id="s${i}-digital"><option value="">— Select —</option><option>Received</option><option>Pending</option><option>Not required</option></select></div></div>
    </div>`;
  }
}

async function saveOrder(){
  const company=document.getElementById('f-company').value.trim();
  const nstyles=parseInt(document.getElementById('f-nstyles').value)||0;
  if(!company){showToast('Company name is required','error');return;}
  if(!nstyles||!document.getElementById('styles-container').children.length){showToast('Generate style fields first','error');return;}
  const btn=document.getElementById('save-btn');
  const lbl=document.getElementById('save-label');
  btn.disabled=true;lbl.innerHTML='<span class="spinner"></span>';
  try{
    const res=await sb('orders?select=id',{
      method:'POST',headers:{...H,'Prefer':'return=representation'},
      body:JSON.stringify({
        company,
        brand_name:document.getElementById('f-brand').value.trim()||null,
        buyer_name:document.getElementById('f-buyer').value.trim()||null,
        mail_subject:document.getElementById('f-mail').value.trim()||null,
        purchase_order:document.getElementById('f-po').value.trim()||null,
        purchase_invoice:document.getElementById('f-invoice').value.trim()||null,
        number_of_styles:nstyles
      })
    });
    const orderId=res[0].id;
    const payload=[];
    for(let i=1;i<=nstyles;i++){
      payload.push({
        order_id:orderId,
        style_no:document.getElementById(`s${i}-style_no`).value.trim()||null,
        quantity:parseInt(document.getElementById(`s${i}-quantity`).value)||null,
        tech_pack_date:document.getElementById(`s${i}-tech_pack_date`).value||null,
        hd_file:document.getElementById(`s${i}-hd_file`).value||null,
        digital:document.getElementById(`s${i}-digital`).value||null,
      });
    }
    await sb('styles',{method:'POST',body:JSON.stringify(payload)});
    showToast('Order saved!','success');
    clearForm();
  }catch(e){showToast('Error saving. Try again.','error');console.error(e);}
  btn.disabled=false;lbl.textContent='Submit Order';
}

function clearForm(){
  ['f-company','f-brand','f-buyer','f-mail','f-po','f-invoice','f-nstyles'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('styles-container').innerHTML='';
}

// ── DASHBOARD ──
async function loadDashboard(){
  document.getElementById('orders-list').innerHTML='<div class="empty"><span class="spinner spinner-dark"></span> Loading…</div>';
  try{
    const [orders,styles]=await Promise.all([
      sb('orders?select=*&order=created_at.desc'),
      sb('styles?select=*&order=created_at.asc')
    ]);
    allOrders=orders||[];allStyles=styles||[];
    renderStats();renderDash();
  }catch(e){showToast('Error loading','error');}
}

function renderStats(){
  const t=allStyles.length;
  const ap=allStyles.filter(s=>s.approved_date).length;
  const pr=allStyles.filter(s=>['In Production','Packing'].includes(s.production_status)).length;
  const co=allStyles.filter(s=>s.production_status==='Correction Required').length;
  const de=allStyles.filter(s=>s.production_status==='Delivered').length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat s-total"><div class="stat-lbl">Total Styles</div><div class="stat-num">${t}</div></div>
    <div class="stat s-approved"><div class="stat-lbl">Approved</div><div class="stat-num">${ap}</div></div>
    <div class="stat s-prod"><div class="stat-lbl">In Production</div><div class="stat-num">${pr}</div></div>
    <div class="stat s-correction"><div class="stat-lbl">Correction</div><div class="stat-num">${co}</div></div>
    <div class="stat s-delivered"><div class="stat-lbl">Delivered</div><div class="stat-num">${de}</div></div>`;
}

const SB={'Pending':'b-pending','Tech Pack Received':'b-sampling','Sampling':'b-sampling','Correction Required':'b-correction','Approved':'b-approved','In Production':'b-production','Packing':'b-production','Ready for Dispatch':'b-dispatch','Delivered':'b-delivered'};

function renderDash(){
  const q=(document.getElementById('search')?.value||'').toLowerCase().trim();
  const sf=document.getElementById('f-status')?.value||'';
  const list=document.getElementById('orders-list');
  list.innerHTML='';

  // filter styles
  let filteredStyles=allStyles.filter(s=>{
    const o=allOrders.find(o=>o.id===s.order_id)||{};
    // search across ALL fields
    const searchFields=[
      o.company, o.brand_name, o.buyer_name, o.purchase_order,
      o.purchase_invoice, o.mail_subject,
      s.style_no, s.hd_file, s.digital, s.production_status,
      s.correction_remarks, s.quantity
    ].map(v=>(v||'').toString().toLowerCase()).join(' ');
    const ms=!q||searchFields.includes(q);
    // hide delivered by default unless specifically selected
    const hideDelivered=sf===''&&s.production_status==='Delivered';
    const matchStatus=sf===''?!hideDelivered:sf==='all'?true:(s.production_status===sf);
    return ms&&matchStatus;
  });

  // sort orders
  const sort=document.getElementById('f-sort')?.value||'date-desc';
  const orderIds=[...new Set(filteredStyles.map(s=>s.order_id))].sort((a,b)=>{
    const oa=allOrders.find(o=>o.id===a)||{};
    const ob=allOrders.find(o=>o.id===b)||{};
    if(sort==='company-asc') return (oa.company||'').localeCompare(ob.company||'');
    if(sort==='company-desc') return (ob.company||'').localeCompare(oa.company||'');
    if(sort==='date-asc') return new Date(oa.created_at)-new Date(ob.created_at);
    return new Date(ob.created_at)-new Date(oa.created_at); // date-desc default
  });

  if(!orderIds.length){list.innerHTML='<div class="empty">No orders found</div>';return;}

  orderIds.forEach(oid=>{
    const o=allOrders.find(o=>o.id===oid)||{};
    const styles=filteredStyles.filter(s=>s.order_id===oid);
    const card=document.createElement('div');
    card.className='order-card';

    // header with order-level fields (editable)
    card.innerHTML=`
      <div class="order-card-header">
        <div class="order-header-field">
          <div class="order-header-label">Company</div>
          <input class="order-header-value editable" id="oh-company-${oid}" value="${esc(o.company)}" placeholder="Company">
        </div>
        <div class="order-header-field">
          <div class="order-header-label">Brand</div>
          <input class="order-header-value editable" id="oh-brand-${oid}" value="${esc(o.brand_name)}" placeholder="Brand">
        </div>
        <div class="order-header-field">
          <div class="order-header-label">Buyer</div>
          <input class="order-header-value editable" id="oh-buyer-${oid}" value="${esc(o.buyer_name)}" placeholder="Buyer">
        </div>
        <div class="order-header-field">
          <div class="order-header-label">PO</div>
          <input class="order-header-value editable" id="oh-po-${oid}" value="${esc(o.purchase_order)}" placeholder="PO">
        </div>
        <div class="order-header-field">
          <div class="order-header-label">Invoice</div>
          <input class="order-header-value editable" id="oh-inv-${oid}" value="${esc(o.purchase_invoice)}" placeholder="Invoice">
        </div>
        <div class="order-header-field">
          <div class="order-header-label">Mail Subject</div>
          <input class="order-header-value editable" id="oh-mail-${oid}" value="${esc(o.mail_subject)}" placeholder="Mail subject" style="min-width:140px">
        </div>
        <div class="order-card-divider"></div>
        <button class="btn-sm" onclick="saveOrderHeader('${oid}')">Save header</button>
      </div>

      <div class="style-rows-wrap">
        <table class="style-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Style No.</th>
              <th>Qty</th>
              <th>Tech Pack</th>
              <th>HD File</th>
              <th>Digital</th>
              <th>Samples Submitted</th>
              <th>Approved</th>
              <th>Corrections Date</th>
              <th>Remarks</th>
              <th>Revised</th>
              <th>Production Status</th>
              <th>Delivery Date</th>
              <th>Boxes</th>
              <th>Weight (kg)</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="style-tbody-${oid}"></tbody>
        </table>
      </div>`;

    list.appendChild(card);

    // render style rows
    const tbody=document.getElementById(`style-tbody-${oid}`);
    styles.forEach((s,idx)=>{
      const appr=!!s.approved_date;
      const lk=appr?'':'locked';
      const sid=s.id;
      const tr=document.createElement('tr');
      tr.id='srow-'+sid;
      tr.innerHTML=`
        <td><span class="style-no-badge">${idx+1}</span></td>
        <td><input class="ci" id="ci-sn-${sid}" value="${esc(s.style_no)}" placeholder="Style no." style="min-width:80px"></td>
        <td><input class="ci" type="number" id="ci-qty-${sid}" value="${s.quantity||''}" placeholder="0" style="min-width:60px"></td>
        <td><input class="ci" type="date" id="ci-tp-${sid}" value="${s.tech_pack_date||''}"></td>
        <td>
          <select class="ci" id="ci-hd-${sid}" style="min-width:100px">
            <option value="">—</option>
            <option ${s.hd_file==='Received'?'selected':''}>Received</option>
            <option ${s.hd_file==='Pending'?'selected':''}>Pending</option>
            <option ${s.hd_file==='Not required'?'selected':''}>Not required</option>
          </select>
        </td>
        <td>
          <select class="ci" id="ci-dg-${sid}" style="min-width:100px">
            <option value="">—</option>
            <option ${s.digital==='Received'?'selected':''}>Received</option>
            <option ${s.digital==='Pending'?'selected':''}>Pending</option>
            <option ${s.digital==='Not required'?'selected':''}>Not required</option>
          </select>
        </td>
        <td><input class="ci" type="date" id="ci-ss-${sid}" value="${s.samples_submitted_date||''}"></td>
        <td>
          <div class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" id="ci-appr-${sid}" ${appr?'checked':''} onchange="onToggle('${sid}',this.checked)">
              <span class="toggle-slider"></span>
            </label>
            <span class="tlbl ${appr?'yes':''}" id="tlbl-${sid}">${appr?'Yes':'No'}</span>
          </div>
        </td>
        <td><input class="ci ${lk}" type="date" id="ci-cd-${sid}" value="${s.corrections_date||''}"></td>
        <td><input class="ci ${lk}" id="ci-cr-${sid}" value="${esc(s.correction_remarks)}" placeholder="Remarks" style="min-width:110px"></td>
        <td>
          <select class="ci ${lk}" id="ci-rv-${sid}">
            <option value="false" ${!s.revised?'selected':''}>No</option>
            <option value="true" ${s.revised?'selected':''}>Yes</option>
          </select>
        </td>
        <td>
          <select class="ci ${lk}" id="ci-st-${sid}" style="min-width:130px">
            <option>Pending</option><option>Tech Pack Received</option><option>Sampling</option>
            <option>Correction Required</option><option>Approved</option><option>In Production</option>
            <option>Packing</option><option>Ready for Dispatch</option><option>Delivered</option>
          </select>
        </td>
        <td><input class="ci ${lk}" type="date" id="ci-dl-${sid}" value="${s.delivery_date||''}"></td>
        <td><input class="ci ${lk}" type="number" id="ci-bx-${sid}" value="${s.number_of_boxes||''}" style="min-width:55px"></td>
        <td><input class="ci ${lk}" type="number" step="0.1" id="ci-wt-${sid}" value="${s.weight||''}" style="min-width:60px"></td>
        <td style="white-space:nowrap">
          <button class="btn-save-row" id="btn-save-${sid}" onclick="saveStyleRow('${sid}')">Save</button>
          <button class="btn-del-row" onclick="delStyle('${sid}')">✕</button>
        </td>`;
      tbody.appendChild(tr);
      // set status
      const sel=document.getElementById(`ci-st-${sid}`);
      if(sel&&s.production_status)sel.value=s.production_status;
    });
  });
}

function onToggle(sid,checked){
  const lbl=document.getElementById(`tlbl-${sid}`);
  lbl.textContent=checked?'Yes':'No';
  lbl.className='tlbl '+(checked?'yes':'');
  [`ci-cd-${sid}`,`ci-cr-${sid}`,`ci-rv-${sid}`,`ci-st-${sid}`,`ci-dl-${sid}`,`ci-bx-${sid}`,`ci-wt-${sid}`].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    checked?el.classList.remove('locked'):el.classList.add('locked');
  });
}

async function saveOrderHeader(oid){
  const payload={
    company:document.getElementById(`oh-company-${oid}`).value.trim()||null,
    brand_name:document.getElementById(`oh-brand-${oid}`).value.trim()||null,
    buyer_name:document.getElementById(`oh-buyer-${oid}`).value.trim()||null,
    purchase_order:document.getElementById(`oh-po-${oid}`).value.trim()||null,
    purchase_invoice:document.getElementById(`oh-inv-${oid}`).value.trim()||null,
    mail_subject:document.getElementById(`oh-mail-${oid}`).value.trim()||null,
  };
  try{
    await sb(`orders?id=eq.${oid}`,{method:'PATCH',body:JSON.stringify(payload)});
    // update local
    const o=allOrders.find(o=>o.id===oid);
    if(o)Object.assign(o,payload);
    showToast('Header saved!','success');
  }catch(e){showToast('Error saving header.','error');console.error(e);}
}

async function saveStyleRow(sid){
  const btn=document.getElementById(`btn-save-${sid}`);
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';}

  const isApproved=document.getElementById(`ci-appr-${sid}`).checked;
  const existingStyle=allStyles.find(s=>s.id===sid);

  // Determine approved_date:
  // If toggled on: keep existing or set today
  // If toggled off: set null
  const approvedDate=isApproved
    ?(existingStyle?.approved_date||new Date().toISOString().slice(0,10))
    :null;

  const payload={
    style_no:document.getElementById(`ci-sn-${sid}`).value.trim()||null,
    quantity:parseInt(document.getElementById(`ci-qty-${sid}`).value)||null,
    tech_pack_date:document.getElementById(`ci-tp-${sid}`).value||null,
    hd_file:document.getElementById(`ci-hd-${sid}`).value||null,
    digital:document.getElementById(`ci-dg-${sid}`).value||null,
    samples_submitted_date:document.getElementById(`ci-ss-${sid}`).value||null,
    approved_date:approvedDate,
    corrections_date:document.getElementById(`ci-cd-${sid}`).value||null,
    correction_remarks:document.getElementById(`ci-cr-${sid}`).value.trim()||null,
    revised:document.getElementById(`ci-rv-${sid}`).value==='true',
    production_status:document.getElementById(`ci-st-${sid}`).value||'Pending',
    delivery_date:document.getElementById(`ci-dl-${sid}`).value||null,
    number_of_boxes:parseInt(document.getElementById(`ci-bx-${sid}`).value)||null,
    weight:parseFloat(document.getElementById(`ci-wt-${sid}`).value)||null,
  };

  try{
    await sb(`styles?id=eq.${sid}`,{method:'PATCH',body:JSON.stringify(payload)});
    // update local cache
    const s=allStyles.find(s=>s.id===sid);
    if(s)Object.assign(s,payload);
    showToast('Style saved!','success');
  }catch(e){showToast('Error saving. Try again.','error');console.error(e);}

  if(btn){btn.disabled=false;btn.textContent='Save';}
}

async function delStyle(sid){
  if(!confirm('Delete this style?'))return;
  try{
    await sb(`styles?id=eq.${sid}`,{method:'DELETE'});
    showToast('Deleted','success');
    await loadDashboard();
  }catch(e){showToast('Error deleting.','error');}
}

function exportCSV(){
  if(!allStyles.length){showToast('No data','error');return;}
  const rows=allStyles.map(s=>{
    const o=allOrders.find(o=>o.id===s.order_id)||{};
    return[o.company,o.brand_name,o.buyer_name,o.mail_subject,o.purchase_order,o.purchase_invoice,
      s.style_no,s.quantity,s.tech_pack_date,s.hd_file,s.digital,s.samples_submitted_date,
      s.approved_date,s.corrections_date,s.correction_remarks,s.revised?'Yes':'No',
      s.production_status,s.delivery_date,s.number_of_boxes,s.weight].map(v=>`"${v||''}"`).join(',');
  });
  const hdr='Company,Brand,Buyer,Mail Subject,PO,Invoice,Style No,Qty,Tech Pack Date,HD File,Digital,Samples Date,Approved Date,Corrections Date,Remarks,Revised,Production Status,Delivery Date,Boxes,Weight';
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([hdr+'\n'+rows.join('\n')],{type:'text/csv'}));
  a.download='orders_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

function esc(v){return(v||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
